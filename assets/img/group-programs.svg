<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gp-sky" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="60%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="gp-ground" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="gp-mtn" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <filter id="gp-shd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#92400E" flood-opacity="0.15"/>
    </filter>
    <pattern id="gp-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#FDE68A" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="500" fill="url(#gp-sky)"/>
  <rect width="800" height="500" fill="url(#gp-dots)"/>

  <!-- Ground -->
  <rect x="0" y="390" width="800" height="110" rx="0" fill="url(#gp-ground)"/>
  <!-- Ground edge softening -->
  <ellipse cx="400" cy="390" rx="420" ry="20" fill="#A7F3D0"/>

  <!-- Sun / circle in sky -->
  <circle cx="680" cy="70" r="48" fill="#FCD34D" opacity="0.85"/>
  <circle cx="680" cy="70" r="60" fill="#FCD34D" opacity="0.18"/>

  <!-- MOUNT FUJI silhouette (background, center-right) -->
  <!-- Main mountain body -->
  <polygon points="440,370 580,105 720,370" fill="url(#gp-mtn)"/>
  <!-- Snow cap -->
  <polygon points="540,160 580,105 620,160 600,155 590,165 580,158 570,165 560,155" fill="white" opacity="0.92"/>
  <!-- Snow cap shadow undertone -->
  <polygon points="540,160 580,105 620,160 610,158 580,145 550,158" fill="#E0E7FF" opacity="0.45"/>

  <!-- Mountain subtle shading (right face darker) -->
  <polygon points="580,105 720,370 620,370" fill="#1E1B4B" opacity="0.22"/>

  <!-- TORII GATE (center, in front of mountain) -->
  <!-- Left post -->
  <rect x="316" y="248" width="20" height="160" rx="3" fill="#D97706" filter="url(#gp-shd)"/>
  <!-- Right post -->
  <rect x="464" y="248" width="20" height="160" rx="3" fill="#D97706" filter="url(#gp-shd)"/>
  <!-- Top crossbar (kashigi) - main -->
  <rect x="300" y="228" width="200" height="20" rx="4" fill="#B45309"/>
  <!-- Top crossbar overhang curve ends -->
  <rect x="296" y="230" width="14" height="10" rx="2" fill="#92400E"/>
  <rect x="490" y="230" width="14" height="10" rx="2" fill="#92400E"/>
  <!-- Second crossbar (nuki) -->
  <rect x="314" y="265" width="172" height="12" rx="3" fill="#D97706"/>
  <!-- Top bar (shimagi) -->
  <rect x="290" y="218" width="220" height="14" rx="3" fill="#D97706"/>
  <!-- Very top ornament bar -->
  <rect x="298" y="208" width="204" height="12" rx="2" fill="#B45309"/>

  <!-- PATH (winding from foreground through gate) -->
  <path d="M360,500 Q380,450 390,410 Q400,390 400,368 L400,368" stroke="white" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M440,500 Q420,450 410,410 Q402,390 400,368" stroke="white" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Path highlight -->
  <path d="M380,500 Q392,450 398,410 Q400,390 400,370" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- TREES (left pair) -->
  <g transform="translate(100, 350)">
    <!-- Trunk -->
    <rect x="22" y="32" width="8" height="28" rx="2" fill="#374151"/>
    <!-- Cone levels -->
    <polygon points="0,40 52,40 26,10" fill="#065F46"/>
    <polygon points="6,28 46,28 26,4" fill="#047857"/>
    <polygon points="10,18 42,18 26,0" fill="#059669"/>
  </g>
  <g transform="translate(60, 360)">
    <rect x="17" y="26" width="6" height="22" rx="2" fill="#374151"/>
    <polygon points="0,32 40,32 20,8" fill="#065F46"/>
    <polygon points="5,22 35,22 20,4" fill="#047857"/>
    <polygon points="8,14 32,14 20,0" fill="#059669"/>
  </g>

  <!-- TREES (right pair) -->
  <g transform="translate(636, 350)">
    <rect x="22" y="32" width="8" height="28" rx="2" fill="#374151"/>
    <polygon points="0,40 52,40 26,10" fill="#065F46"/>
    <polygon points="6,28 46,28 26,4" fill="#047857"/>
    <polygon points="10,18 42,18 26,0" fill="#059669"/>
  </g>
  <g transform="translate(678, 360)">
    <rect x="17" y="26" width="6" height="22" rx="2" fill="#374151"/>
    <polygon points="0,32 40,32 20,8" fill="#065F46"/>
    <polygon points="5,22 35,22 20,4" fill="#047857"/>
    <polygon points="8,14 32,14 20,0" fill="#059669"/>
  </g>

  <!-- GROUP FIGURES (foreground, 5 people, varying heights) -->
  <!-- Figure 1 (tallest, leftmost) -->
  <g transform="translate(172, 370)">
    <circle cx="0" cy="-52" r="18" fill="#1E1B4B"/>
    <path d="M-16,-34 Q0,-26 16,-34 L20,30 H-20 Z" fill="#312E81"/>
  </g>

  <!-- Figure 2 -->
  <g transform="translate(224, 382)">
    <circle cx="0" cy="-44" r="16" fill="#3730A3"/>
    <path d="M-14,-30 Q0,-22 14,-30 L18,22 H-18 Z" fill="#4338CA"/>
  </g>

  <!-- Figure 3 (shortest, center-left) -->
  <g transform="translate(272, 392)">
    <circle cx="0" cy="-36" r="14" fill="#1E1B4B"/>
    <path d="M-12,-24 Q0,-18 12,-24 L16,14 H-16 Z" fill="#312E81"/>
  </g>

  <!-- Figure 4 -->
  <g transform="translate(528, 380)">
    <circle cx="0" cy="-46" r="16" fill="#3730A3"/>
    <path d="M-14,-32 Q0,-24 14,-32 L18,24 H-18 Z" fill="#4338CA"/>
  </g>

  <!-- Figure 5 (rightmost, medium) -->
  <g transform="translate(578, 372)">
    <circle cx="0" cy="-50" r="17" fill="#1E1B4B"/>
    <path d="M-15,-34 Q0,-26 15,-34 L19,28 H-19 Z" fill="#312E81"/>
  </g>

  <!-- BIRDS in sky -->
  <g stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M150,95 Q158,88 166,95"/>
    <path d="M174,80 Q183,72 192,80"/>
    <path d="M195,100 Q204,92 213,100"/>
  </g>

  <!-- Sparkle stars -->
  <g fill="#D97706" opacity="0.6">
    <path d="M740,150 L743,160 L753,160 L745,166 L748,176 L740,170 L732,176 L735,166 L727,160 L737,160 Z"/>
  </g>
  <g fill="#FCD34D" opacity="0.7">
    <path d="M62,148 L65,158 L75,158 L67,164 L70,174 L62,168 L54,174 L57,164 L49,158 L59,158 Z"/>
  </g>

  <!-- Accent dots -->
  <circle cx="44" cy="228" r="7" fill="#FCD34D" opacity="0.5"/>
  <circle cx="34" cy="248" r="4" fill="#D97706" opacity="0.4"/>
  <circle cx="762" cy="268" r="9" fill="#D97706" opacity="0.15"/>
  <circle cx="748" cy="290" r="6" fill="#F59E0B" opacity="0.2"/>
</svg>
