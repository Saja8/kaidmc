<svg viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="g6land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#g6)"/>

  <!-- grid -->
  <g stroke="#3b82f6" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="62" x2="400" y2="62"/>
    <line x1="0" y1="125" x2="400" y2="125"/>
    <line x1="0" y1="188" x2="400" y2="188"/>
    <line x1="100" y1="0" x2="100" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="250"/>
    <line x1="300" y1="0" x2="300" y2="250"/>
  </g>

  <!-- two overlapping circles: East meets West / culture bridge -->
  <circle cx="150" cy="118" r="72" fill="#3b82f6" fill-opacity="0.07" stroke="#3b82f6" stroke-opacity="0.20" stroke-width="1.5"/>
  <circle cx="250" cy="118" r="72" fill="#06b6d4" fill-opacity="0.07" stroke="#06b6d4" stroke-opacity="0.20" stroke-width="1.5"/>

  <!-- left-circle landmark: abstract pagoda tiers -->
  <rect x="108" y="92" width="32" height="6" rx="2" fill="#3b82f6" fill-opacity="0.40"/>
  <rect x="112" y="99" width="24" height="6" rx="2" fill="#3b82f6" fill-opacity="0.35"/>
  <rect x="116" y="106" width="16" height="6" rx="2" fill="#3b82f6" fill-opacity="0.30"/>
  <rect x="120" y="112" width="8" height="12" rx="1" fill="#3b82f6" fill-opacity="0.28"/>
  <!-- pagoda base -->
  <rect x="104" y="124" width="40" height="4" rx="1" fill="#3b82f6" fill-opacity="0.22"/>
  <!-- curved roof hints -->
  <path d="M 104 92 Q 124 84 144 92" stroke="#3b82f6" stroke-opacity="0.28" stroke-width="1.5" fill="none"/>

  <!-- right-circle landmark: abstract arch / gateway -->
  <path d="M 238 128 L 238 100 Q 238 88 250 88 Q 262 88 262 100 L 262 128" stroke="#06b6d4" stroke-opacity="0.40" stroke-width="2" fill="none"/>
  <line x1="234" y1="128" x2="266" y2="128" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="2"/>
  <!-- arch keystone -->
  <circle cx="250" cy="90" r="4" fill="#06b6d4" fill-opacity="0.50"/>

  <!-- center bridge / merge dot -->
  <circle cx="200" cy="118" r="10" fill="#3b82f6" fill-opacity="0.22"/>
  <circle cx="200" cy="118" r="5" fill="#3b82f6" fill-opacity="0.60"/>

  <!-- travel arc above -->
  <path d="M 80 100 Q 200 42 320 100" stroke="#06b6d4" stroke-opacity="0.30" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
  <circle cx="80" cy="100" r="4" fill="#06b6d4" fill-opacity="0.50"/>
  <circle cx="320" cy="100" r="4" fill="#06b6d4" fill-opacity="0.50"/>

  <!-- horizon -->
  <path d="M 0 185 Q 100 170 200 178 Q 300 186 400 170 L 400 250 L 0 250 Z" fill="url(#g6land)"/>

  <!-- dot accent -->
  <circle cx="350" cy="38" r="3.5" fill="#3b82f6" fill-opacity="0.18"/>
  <circle cx="364" cy="38" r="3.5" fill="#3b82f6" fill-opacity="0.11"/>
  <circle cx="378" cy="38" r="3.5" fill="#3b82f6" fill-opacity="0.06"/>
  <circle cx="350" cy="52" r="3.5" fill="#3b82f6" fill-opacity="0.11"/>
  <circle cx="364" cy="52" r="3.5" fill="#3b82f6" fill-opacity="0.06"/>
</svg>
