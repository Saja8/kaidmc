<svg viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#g8)"/>

  <!-- grid -->
  <g stroke="#3b82f6" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="62" x2="400" y2="62"/>
    <line x1="0" y1="125" x2="400" y2="125"/>
    <line x1="0" y1="188" x2="400" y2="188"/>
    <line x1="100" y1="0" x2="100" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="250"/>
    <line x1="300" y1="0" x2="300" y2="250"/>
  </g>

  <!-- trophy cup -->
  <path d="M 152 48 L 248 48 L 240 102 Q 232 130 200 137 Q 168 130 160 102 Z"
        fill="#3b82f6" fill-opacity="0.16" stroke="#3b82f6" stroke-opacity="0.30" stroke-width="1.5"/>
  <!-- trophy handles -->
  <path d="M 152 58 Q 122 58 122 82 Q 122 108 152 102"
        stroke="#3b82f6" stroke-opacity="0.28" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 248 58 Q 278 58 278 82 Q 278 108 248 102"
        stroke="#3b82f6" stroke-opacity="0.28" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- stem -->
  <rect x="197" y="137" width="6" height="28" rx="2" fill="#3b82f6" fill-opacity="0.28"/>
  <!-- base -->
  <rect x="164" y="164" width="72" height="10" rx="3" fill="#3b82f6" fill-opacity="0.26"/>
  <!-- base shadow line -->
  <rect x="160" y="174" width="80" height="4" rx="2" fill="#3b82f6" fill-opacity="0.14"/>

  <!-- star inside cup -->
  <polygon points="200,62 205,78 222,78 209,88 214,104 200,94 186,104 191,88 178,78 195,78"
           fill="#3b82f6" fill-opacity="0.45"/>

  <!-- decorative arc above trophy -->
  <path d="M 140 40 Q 200 16 260 40"
        stroke="#06b6d4" stroke-opacity="0.28" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <circle cx="140" cy="40" r="3.5" fill="#06b6d4" fill-opacity="0.45"/>
  <circle cx="260" cy="40" r="3.5" fill="#06b6d4" fill-opacity="0.45"/>

  <!-- side accent circles (competition) -->
  <circle cx="90"  cy="82"  r="8"  fill="#06b6d4" fill-opacity="0.22" stroke="#06b6d4" stroke-opacity="0.30" stroke-width="1"/>
  <circle cx="310" cy="82"  r="8"  fill="#06b6d4" fill-opacity="0.22" stroke="#06b6d4" stroke-opacity="0.30" stroke-width="1"/>
  <circle cx="72"  cy="108" r="5"  fill="#3b82f6" fill-opacity="0.18"/>
  <circle cx="328" cy="108" r="5"  fill="#3b82f6" fill-opacity="0.18"/>

  <!-- team people row -->
  <circle cx="136" cy="210" r="7" fill="#3b82f6" fill-opacity="0.28"/>
  <circle cx="160" cy="216" r="7" fill="#3b82f6" fill-opacity="0.22"/>
  <circle cx="184" cy="210" r="7" fill="#3b82f6" fill-opacity="0.32"/>
  <circle cx="208" cy="216" r="7" fill="#3b82f6" fill-opacity="0.22"/>
  <circle cx="232" cy="210" r="7" fill="#3b82f6" fill-opacity="0.28"/>
  <circle cx="256" cy="216" r="7" fill="#3b82f6" fill-opacity="0.18"/>

  <!-- dot accent top-right -->
  <circle cx="350" cy="36" r="3.5" fill="#3b82f6" fill-opacity="0.18"/>
  <circle cx="364" cy="36" r="3.5" fill="#3b82f6" fill-opacity="0.11"/>
  <circle cx="378" cy="36" r="3.5" fill="#3b82f6" fill-opacity="0.06"/>
  <circle cx="350" cy="50" r="3.5" fill="#3b82f6" fill-opacity="0.11"/>
  <circle cx="364" cy="50" r="3.5" fill="#3b82f6" fill-opacity="0.06"/>
</svg>
