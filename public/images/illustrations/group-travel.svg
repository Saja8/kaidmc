<svg viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="g3land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#g3)"/>

  <!-- subtle grid -->
  <g stroke="#3b82f6" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="62" x2="400" y2="62"/>
    <line x1="0" y1="125" x2="400" y2="125"/>
    <line x1="0" y1="188" x2="400" y2="188"/>
    <line x1="100" y1="0" x2="100" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="250"/>
    <line x1="300" y1="0" x2="300" y2="250"/>
  </g>

  <!-- landscape: rolling horizon -->
  <path d="M 0 175 Q 80 130 160 155 Q 240 178 320 140 Q 370 118 400 130 L 400 250 L 0 250 Z" fill="url(#g3land)"/>
  <!-- second layer hill -->
  <path d="M 0 195 Q 60 180 130 188 Q 200 196 280 175 Q 340 158 400 168 L 400 250 L 0 250 Z" fill="#3b82f6" fill-opacity="0.07"/>

  <!-- horizon line -->
  <line x1="0" y1="195" x2="400" y2="195" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="1"/>

  <!-- person 1 -->
  <circle cx="148" cy="166" r="9" fill="#3b82f6" fill-opacity="0.45"/>
  <path d="M 140 200 Q 148 175 156 200" fill="#3b82f6" fill-opacity="0.40"/>

  <!-- person 2 (center, slightly larger / in front) -->
  <circle cx="200" cy="160" r="10" fill="#3b82f6" fill-opacity="0.58"/>
  <path d="M 191 196 Q 200 168 209 196" fill="#3b82f6" fill-opacity="0.52"/>

  <!-- person 3 -->
  <circle cx="252" cy="166" r="9" fill="#3b82f6" fill-opacity="0.45"/>
  <path d="M 244 200 Q 252 175 260 200" fill="#3b82f6" fill-opacity="0.40"/>

  <!-- connection arc above people (journey/travel) -->
  <path d="M 80 148 Q 200 80 320 148" stroke="#06b6d4" stroke-opacity="0.40" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>

  <!-- origin dot -->
  <circle cx="80"  cy="148" r="5" fill="#06b6d4" fill-opacity="0.60"/>
  <!-- destination dot -->
  <circle cx="320" cy="148" r="5" fill="#06b6d4" fill-opacity="0.60"/>
  <!-- midpoint plane dot -->
  <circle cx="200" cy="90"  r="4" fill="#06b6d4" fill-opacity="0.80"/>
  <line x1="200" y1="90" x2="200" y2="104" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1"/>

  <!-- dot accent top-left -->
  <circle cx="36"  cy="36" r="3" fill="#3b82f6" fill-opacity="0.20"/>
  <circle cx="50"  cy="36" r="3" fill="#3b82f6" fill-opacity="0.12"/>
  <circle cx="64"  cy="36" r="3" fill="#3b82f6" fill-opacity="0.07"/>
  <circle cx="36"  cy="50" r="3" fill="#3b82f6" fill-opacity="0.12"/>
  <circle cx="50"  cy="50" r="3" fill="#3b82f6" fill-opacity="0.07"/>
</svg>
