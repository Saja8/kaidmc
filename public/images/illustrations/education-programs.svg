<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ep-bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="ep-book-l" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="ep-book-r" x1="1" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="ep-fig" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="ep-shd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#059669" flood-opacity="0.14"/>
    </filter>
    <pattern id="ep-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#A7F3D0" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#ep-bg)"/>
  <rect width="800" height="500" fill="url(#ep-dots)"/>

  <!-- OPEN BOOK (center-left) -->
  <!-- Book spine (vertical line) -->
  <line x1="295" y1="168" x2="295" y2="390" stroke="#059669" stroke-width="6" stroke-linecap="round"/>

  <!-- Left page (diamond/rhombus shape, perspective) -->
  <path d="M295,168 L110,210 L110,390 L295,390 Z" fill="url(#ep-book-l)" stroke="#A7F3D0" stroke-width="1.5" filter="url(#ep-shd)"/>

  <!-- Right page -->
  <path d="M295,168 L490,210 L490,390 L295,390 Z" fill="url(#ep-book-r)" stroke="#A7F3D0" stroke-width="1.5"/>

  <!-- Left page content: world map lines suggestion -->
  <g stroke="#A7F3D0" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M130,245 Q160,240 185,248 Q210,255 230,248 Q255,240 270,245"/>
    <path d="M130,268 Q150,262 168,268 Q190,274 215,268 Q240,262 268,268"/>
    <path d="M130,292 Q155,287 180,292 Q205,298 235,292 Q258,287 275,292"/>
    <path d="M130,315 Q160,310 190,315 Q215,320 245,315 Q265,310 280,315"/>
    <!-- Continent blob suggestions -->
    <path d="M145,238 Q158,228 172,232 Q180,238 170,248 Q155,250 145,238 Z" fill="#A7F3D0" opacity="0.35" stroke="none"/>
    <path d="M200,242 Q215,235 228,240 Q233,250 218,256 Q204,255 200,242 Z" fill="#A7F3D0" opacity="0.35" stroke="none"/>
    <path d="M155,268 Q167,262 180,266 Q185,274 172,278 Q158,278 155,268 Z" fill="#A7F3D0" opacity="0.3" stroke="none"/>
  </g>

  <!-- Right page content: text lines -->
  <g stroke="#A7F3D0" stroke-width="1.5" opacity="0.6" stroke-linecap="round">
    <line x1="315" y1="240" x2="468" y2="248"/>
    <line x1="315" y1="260" x2="458" y2="267"/>
    <line x1="315" y1="280" x2="470" y2="287"/>
    <line x1="315" y1="300" x2="445" y2="307"/>
    <line x1="315" y1="320" x2="465" y2="327"/>
    <line x1="315" y1="340" x2="452" y2="347"/>
    <line x1="315" y1="360" x2="468" y2="367"/>
  </g>

  <!-- GRADUATION CAP (upper-right) -->
  <g transform="translate(580, 100) rotate(-12)">
    <!-- Cap top (square) -->
    <polygon points="0,-30 60,-10 55,18 -5,18" fill="#059669"/>
    <polygon points="0,-30 60,-10 55,18 -5,18" fill="#059669" stroke="#34D399" stroke-width="1.5"/>
    <!-- Cap brim -->
    <rect x="-10" y="12" width="75" height="12" rx="3" fill="#047857"/>
    <!-- Tassel string -->
    <line x1="55" y1="5" x2="72" y2="30" stroke="#34D399" stroke-width="2"/>
    <circle cx="72" cy="34" r="6" fill="#FCD34D"/>
    <!-- Tassel fringe -->
    <line x1="68" y1="40" x2="65" y2="56" stroke="#FCD34D" stroke-width="1.5"/>
    <line x1="72" y1="40" x2="72" y2="57" stroke="#FCD34D" stroke-width="1.5"/>
    <line x1="76" y1="40" x2="79" y2="56" stroke="#FCD34D" stroke-width="1.5"/>
  </g>

  <!-- CHERRY BLOSSOM BRANCH (upper-left) -->
  <!-- Branch -->
  <path d="M40,60 Q80,90 120,130 Q150,160 140,200" stroke="#6B7280" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M80,90 Q110,70 140,75" stroke="#6B7280" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M120,130 Q140,110 165,108" stroke="#6B7280" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Blossom 1 (on branch, ~80,90) -->
  <g transform="translate(82,85)">
    <circle cx="0" cy="-9" r="6" fill="#FBCFE8"/>
    <circle cx="9" cy="-3" r="6" fill="#F9A8D4"/>
    <circle cx="6" cy="7" r="6" fill="#FBCFE8"/>
    <circle cx="-6" cy="7" r="6" fill="#F9A8D4"/>
    <circle cx="-9" cy="-3" r="6" fill="#FBCFE8"/>
    <circle cx="0" cy="0" r="5" fill="white"/>
    <circle cx="0" cy="0" r="2" fill="#FCD34D"/>
  </g>

  <!-- Blossom 2 (~140,75) -->
  <g transform="translate(143,72)">
    <circle cx="0" cy="-8" r="5" fill="#F9A8D4"/>
    <circle cx="8" cy="-2" r="5" fill="#FBCFE8"/>
    <circle cx="5" cy="6" r="5" fill="#F9A8D4"/>
    <circle cx="-5" cy="6" r="5" fill="#FBCFE8"/>
    <circle cx="-8" cy="-2" r="5" fill="#F9A8D4"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
    <circle cx="0" cy="0" r="2" fill="#FCD34D"/>
  </g>

  <!-- Blossom 3 (~165,108) -->
  <g transform="translate(168,106)">
    <circle cx="0" cy="-7" r="5" fill="#FBCFE8"/>
    <circle cx="7" cy="-2" r="5" fill="#F9A8D4"/>
    <circle cx="4" cy="6" r="5" fill="#FBCFE8"/>
    <circle cx="-4" cy="6" r="5" fill="#F9A8D4"/>
    <circle cx="-7" cy="-2" r="5" fill="#FBCFE8"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
    <circle cx="0" cy="0" r="2" fill="#FCD34D"/>
  </g>

  <!-- Blossom 4 (~120,130) -->
  <g transform="translate(116,132)">
    <circle cx="0" cy="-7" r="5" fill="#F9A8D4"/>
    <circle cx="7" cy="-2" r="5" fill="#FBCFE8"/>
    <circle cx="4" cy="6" r="5" fill="#F9A8D4"/>
    <circle cx="-4" cy="6" r="5" fill="#FBCFE8"/>
    <circle cx="-7" cy="-2" r="5" fill="#F9A8D4"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
    <circle cx="0" cy="0" r="2" fill="#FCD34D"/>
  </g>

  <!-- Floating petals -->
  <ellipse cx="220" cy="130" rx="5" ry="7" fill="#FBCFE8" opacity="0.7" transform="rotate(30,220,130)"/>
  <ellipse cx="260" cy="145" rx="4" ry="6" fill="#F9A8D4" opacity="0.65" transform="rotate(-20,260,145)"/>
  <ellipse cx="195" cy="165" rx="4" ry="6" fill="#FBCFE8" opacity="0.6" transform="rotate(15,195,165)"/>
  <ellipse cx="240" cy="175" rx="3" ry="5" fill="#F9A8D4" opacity="0.5" transform="rotate(-35,240,175)"/>

  <!-- Small GLOBE (lower-right) -->
  <circle cx="672" cy="368" r="68" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
  <g clip-path="url(#ep-globeclip)" stroke="#34D399" stroke-width="0.8" fill="none" opacity="0.5">
    <ellipse cx="672" cy="368" rx="22" ry="68"/>
    <ellipse cx="672" cy="368" rx="44" ry="68"/>
    <ellipse cx="672" cy="368" rx="68" ry="22"/>
    <ellipse cx="672" cy="368" rx="68" ry="44"/>
    <line x1="604" y1="368" x2="740" y2="368"/>
    <line x1="672" y1="300" x2="672" y2="436"/>
  </g>
  <defs>
    <clipPath id="ep-globeclip">
      <circle cx="672" cy="368" r="68"/>
    </clipPath>
  </defs>
  <!-- Continent marks on globe -->
  <ellipse cx="652" cy="355" rx="12" ry="8" fill="#A7F3D0" opacity="0.6"/>
  <ellipse cx="688" cy="360" rx="9" ry="6" fill="#A7F3D0" opacity="0.5"/>
  <ellipse cx="668" cy="378" rx="8" ry="5" fill="#A7F3D0" opacity="0.45"/>

  <!-- STUDENT FIGURE (lower-center) -->
  <circle cx="405" cy="380" r="22" fill="url(#ep-fig)"/>
  <path d="M384,403 C392,394 405,402 405,402 C405,402 418,394 426,403 L430,455 H380 Z" fill="#059669"/>
  <!-- Book in hands -->
  <rect x="385" y="415" width="25" height="18" rx="2" fill="#34D399" stroke="#ECFDF5" stroke-width="1.5"/>
  <line x1="397" y1="416" x2="397" y2="432" stroke="#ECFDF5" stroke-width="1" opacity="0.7"/>

  <!-- Pencil icon (floating left of globe) -->
  <g transform="translate(548, 330) rotate(-35)">
    <rect x="0" y="0" width="10" height="45" rx="2" fill="#059669"/>
    <polygon points="0,45 10,45 5,58" fill="#FCD34D"/>
    <rect x="0" y="0" width="10" height="6" rx="2" fill="#34D399"/>
  </g>

  <!-- Sparkle stars -->
  <g fill="#059669" opacity="0.55">
    <!-- 4-point star upper right area -->
    <path d="M530,80 L533,90 L543,90 L535,96 L538,106 L530,100 L522,106 L525,96 L517,90 L527,90 Z"/>
  </g>
  <g fill="#FCD34D" opacity="0.7">
    <path d="M720,80 L722,88 L730,88 L724,93 L726,101 L720,96 L714,101 L716,93 L710,88 L718,88 Z"/>
  </g>

  <!-- Accent dots -->
  <circle cx="46" cy="308" r="8" fill="#A7F3D0" opacity="0.5"/>
  <circle cx="36" cy="330" r="5" fill="#34D399" opacity="0.4"/>
  <circle cx="764" cy="130" r="8" fill="#34D399" opacity="0.18"/>
  <circle cx="752" cy="148" r="5" fill="#059669" opacity="0.22"/>
  <circle cx="492" cy="460" r="6" fill="#A7F3D0" opacity="0.5"/>
  <circle cx="464" cy="470" r="4" fill="#34D399" opacity="0.4"/>
</svg>
