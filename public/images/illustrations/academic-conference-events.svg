<svg viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#g4)"/>

  <!-- subtle grid -->
  <g stroke="#3b82f6" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="62" x2="400" y2="62"/>
    <line x1="0" y1="125" x2="400" y2="125"/>
    <line x1="0" y1="188" x2="400" y2="188"/>
    <line x1="100" y1="0" x2="100" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="250"/>
    <line x1="300" y1="0" x2="300" y2="250"/>
  </g>

  <!-- presentation screen -->
  <rect x="80" y="48" width="210" height="130" rx="6" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.22" stroke-width="1.5"/>
  <!-- content lines on screen -->
  <line x1="102" y1="76" x2="268" y2="76" stroke="#3b82f6" stroke-opacity="0.32" stroke-width="2"/>
  <line x1="102" y1="96" x2="248" y2="96" stroke="#3b82f6" stroke-opacity="0.20" stroke-width="1.5"/>
  <line x1="102" y1="114" x2="224" y2="114" stroke="#3b82f6" stroke-opacity="0.14" stroke-width="1.5"/>
  <line x1="102" y1="132" x2="236" y2="132" stroke="#3b82f6" stroke-opacity="0.10" stroke-width="1.5"/>
  <!-- screen stand -->
  <line x1="185" y1="178" x2="185" y2="195" stroke="#3b82f6" stroke-opacity="0.22" stroke-width="2"/>
  <line x1="165" y1="195" x2="205" y2="195" stroke="#3b82f6" stroke-opacity="0.22" stroke-width="2"/>

  <!-- audience row 1 -->
  <circle cx="108" cy="213" r="6" fill="#3b82f6" fill-opacity="0.28"/>
  <circle cx="132" cy="218" r="6" fill="#3b82f6" fill-opacity="0.22"/>
  <circle cx="156" cy="213" r="6" fill="#3b82f6" fill-opacity="0.28"/>
  <circle cx="180" cy="218" r="6" fill="#3b82f6" fill-opacity="0.22"/>
  <circle cx="204" cy="213" r="6" fill="#3b82f6" fill-opacity="0.28"/>
  <circle cx="228" cy="218" r="6" fill="#3b82f6" fill-opacity="0.22"/>
  <circle cx="252" cy="213" r="6" fill="#3b82f6" fill-opacity="0.16"/>
  <circle cx="276" cy="218" r="6" fill="#3b82f6" fill-opacity="0.12"/>

  <!-- microphone accent (right side) -->
  <rect x="318" y="90" width="18" height="32" rx="9" fill="#06b6d4" fill-opacity="0.38"/>
  <line x1="327" y1="122" x2="327" y2="140" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="2" stroke-linecap="round"/>
  <path d="M 315 140 Q 315 150 327 150 Q 339 150 339 140" stroke="#06b6d4" stroke-opacity="0.30" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- sound waves -->
  <path d="M 306 98 Q 300 106 306 114" stroke="#06b6d4" stroke-opacity="0.22" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 348 98 Q 354 106 348 114" stroke="#06b6d4" stroke-opacity="0.22" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- dot accent top-right -->
  <circle cx="348" cy="36" r="3" fill="#3b82f6" fill-opacity="0.20"/>
  <circle cx="362" cy="36" r="3" fill="#3b82f6" fill-opacity="0.12"/>
  <circle cx="376" cy="36" r="3" fill="#3b82f6" fill-opacity="0.07"/>
  <circle cx="348" cy="50" r="3" fill="#3b82f6" fill-opacity="0.12"/>
  <circle cx="362" cy="50" r="3" fill="#3b82f6" fill-opacity="0.07"/>
</svg>
