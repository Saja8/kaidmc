<svg viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#g2)"/>

  <!-- subtle grid -->
  <g stroke="#3b82f6" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="62" x2="400" y2="62"/>
    <line x1="0" y1="125" x2="400" y2="125"/>
    <line x1="0" y1="188" x2="400" y2="188"/>
    <line x1="100" y1="0" x2="100" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="250"/>
    <line x1="300" y1="0" x2="300" y2="250"/>
  </g>

  <!-- rising bars -->
  <rect x="48"  y="188" width="32" height="42" rx="3" fill="#3b82f6" fill-opacity="0.12"/>
  <rect x="92"  y="162" width="32" height="68" rx="3" fill="#3b82f6" fill-opacity="0.18"/>
  <rect x="136" y="132" width="32" height="98" rx="3" fill="#3b82f6" fill-opacity="0.24"/>
  <rect x="180" y="100" width="32" height="130" rx="3" fill="#3b82f6" fill-opacity="0.30"/>
  <rect x="224" y="76"  width="32" height="154" rx="3" fill="#3b82f6" fill-opacity="0.36"/>

  <!-- trend line -->
  <polyline points="64,182 108,156 152,126 196,94 240,70" stroke="#3b82f6" stroke-opacity="0.70" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- dots on trend line -->
  <circle cx="64"  cy="182" r="4" fill="#3b82f6" fill-opacity="0.80"/>
  <circle cx="108" cy="156" r="4" fill="#3b82f6" fill-opacity="0.80"/>
  <circle cx="152" cy="126" r="4" fill="#3b82f6" fill-opacity="0.80"/>
  <circle cx="196" cy="94"  r="4" fill="#3b82f6" fill-opacity="0.80"/>
  <circle cx="240" cy="70"  r="5" fill="#3b82f6" fill-opacity="1.00"/>

  <!-- network nodes right side -->
  <circle cx="310" cy="88"  r="10" fill="#06b6d4" fill-opacity="0.25" stroke="#06b6d4" stroke-opacity="0.50" stroke-width="1.5"/>
  <circle cx="356" cy="136" r="10" fill="#06b6d4" fill-opacity="0.25" stroke="#06b6d4" stroke-opacity="0.50" stroke-width="1.5"/>
  <circle cx="304" cy="178" r="10" fill="#06b6d4" fill-opacity="0.25" stroke="#06b6d4" stroke-opacity="0.50" stroke-width="1.5"/>
  <line x1="310" y1="88"  x2="356" y2="136" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="356" y1="136" x2="304" y2="178" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="310" y1="88"  x2="304" y2="178" stroke="#06b6d4" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- connection from chart to network -->
  <line x1="240" y1="70" x2="302" y2="85" stroke="#3b82f6" stroke-opacity="0.28" stroke-width="1.5" stroke-dasharray="4 4"/>
</svg>
