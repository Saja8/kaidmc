<svg viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#g7)"/>

  <!-- grid -->
  <g stroke="#3b82f6" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="62" x2="400" y2="62"/>
    <line x1="0" y1="125" x2="400" y2="125"/>
    <line x1="0" y1="188" x2="400" y2="188"/>
    <line x1="100" y1="0" x2="100" y2="250"/>
    <line x1="200" y1="0" x2="200" y2="250"/>
    <line x1="300" y1="0" x2="300" y2="250"/>
  </g>

  <!-- outer ring -->
  <circle cx="200" cy="118" r="78" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-opacity="0.14" stroke-width="1.5"/>
  <circle cx="200" cy="118" r="56" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- star / award shape -->
  <polygon points="200,68 209,97 240,97 216,115 225,144 200,127 175,144 184,115 160,97 191,97"
           fill="#3b82f6" fill-opacity="0.55"/>

  <!-- ribbon tails below -->
  <path d="M 178 144 L 168 175 L 200 158 L 232 175 L 222 144" fill="#06b6d4" fill-opacity="0.35"/>
  <!-- ribbon border line -->
  <line x1="178" y1="144" x2="222" y2="144" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>

  <!-- ray lines from center -->
  <line x1="200" y1="40"  x2="200" y2="55"  stroke="#3b82f6" stroke-opacity="0.30" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="256" y1="55"  x2="246" y2="65"  stroke="#3b82f6" stroke-opacity="0.22" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="144" y1="55"  x2="154" y2="65"  stroke="#3b82f6" stroke-opacity="0.22" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="272" y1="118" x2="257" y2="118" stroke="#3b82f6" stroke-opacity="0.20" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="128" y1="118" x2="143" y2="118" stroke="#3b82f6" stroke-opacity="0.20" stroke-width="1.5" stroke-linecap="round"/>

  <!-- corner dots -->
  <circle cx="200" cy="38"  r="4" fill="#3b82f6" fill-opacity="0.50"/>
  <circle cx="260" cy="50"  r="3" fill="#06b6d4" fill-opacity="0.38"/>
  <circle cx="140" cy="50"  r="3" fill="#06b6d4" fill-opacity="0.38"/>
  <circle cx="278" cy="118" r="3" fill="#3b82f6" fill-opacity="0.30"/>
  <circle cx="122" cy="118" r="3" fill="#3b82f6" fill-opacity="0.30"/>

  <!-- dot accent top-right -->
  <circle cx="350" cy="36" r="3.5" fill="#3b82f6" fill-opacity="0.18"/>
  <circle cx="364" cy="36" r="3.5" fill="#3b82f6" fill-opacity="0.11"/>
  <circle cx="378" cy="36" r="3.5" fill="#3b82f6" fill-opacity="0.06"/>
  <circle cx="350" cy="50" r="3.5" fill="#3b82f6" fill-opacity="0.11"/>
  <circle cx="364" cy="50" r="3.5" fill="#3b82f6" fill-opacity="0.06"/>
</svg>
